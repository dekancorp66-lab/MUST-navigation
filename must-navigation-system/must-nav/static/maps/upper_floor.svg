  <line x1="651" y1="190" x2="839" y2="39"  stroke="rgba(74,98,120,0.18)" stroke-width="1"/>
  <line x1="651" y1="225" x2="839" y2="82"  stroke="rgba(74,98,120,0.18)" stroke-width="1"/>
  <line x1="660" y1="269" x2="839" y2="120" stroke="rgba(74,98,120,0.18)" stroke-width="1"/>
  <line x1="700" y1="269" x2="839" y2="160" stroke="rgba(74,98,120,0.18)" stroke-width="1"/>
  <line x1="740" y1="269" x2="839" y2="200" stroke="rgba(74,98,120,0.18)" stroke-width="1"/>
  <line x1="780" y1="269" x2="839" y2="240" stroke="rgba(74,98,120,0.18)" stroke-width="1"/>
