  <rect x="130" y="60" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="210" y="60" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="290" y="60" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="370" y="60" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="50"  y="130" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="130" y="130" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="210" y="130" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
  <rect x="290" y="130" width="60" height="40" fill="none" stroke="rgba(160,77,204,0.2)" stroke-width="0.5" rx="1"/>
