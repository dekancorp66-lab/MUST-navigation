  <rect x="668" y="410" width="153" height="12" fill="none" stroke="rgba(46,64,83,0.3)" stroke-width="0.5" rx="1"/>
  <rect x="668" y="430" width="153" height="12" fill="none" stroke="rgba(46,64,83,0.3)" stroke-width="0.5" rx="1"/>
  <rect x="668" y="450" width="153" height="12" fill="none" stroke="rgba(46,64,83,0.3)" stroke-width="0.5" rx="1"/>
