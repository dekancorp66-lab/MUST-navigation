  <line x1="745" y1="145" x2="745" y2="300" stroke="rgba(0,201,167,0.15)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Compass -->
  <circle cx="825" cy="40" r="14" fill="none" stroke="rgba(0,160,220,0.12)" stroke-width="0.8"/>
  <path d="M825,27 L821,52 L825,44 L829,52 Z" fill="rgba(0,180,150,0.5)"/>
  <text style="font-size:7px;fill:rgba(0,180,150,0.5)" x="825" y="22" text-anchor="middle">N</text>

  <!-- Footer label -->
  <text class="mono" style="font-size:9px;fill:rgba(0,160,220,0.25);letter-spacing:2"
