  <!-- Nav nodes (informational) -->
  <circle cx="135" cy="300" r="3" fill="rgba(0,201,167,0.3)"/>
  <circle cx="385" cy="300" r="3" fill="rgba(0,201,167,0.3)"/>
  <circle cx="565" cy="300" r="3" fill="rgba(0,201,167,0.3)"/>
  <circle cx="745" cy="300" r="3" fill="rgba(0,201,167,0.3)"/>
  <circle cx="745" cy="145" r="3" fill="rgba(0,201,167,0.3)"/>

